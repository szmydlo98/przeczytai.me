name: Discord Notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, reopened, synchronize]

jobs:
  notify:
    name: Send Discord notification
    runs-on: ubuntu-latest

    steps:
      - name: Build and send Discord message
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          ACTOR_URL="https://github.com/${{ github.actor }}"
          AVATAR_URL="https://github.com/${{ github.actor }}.png"

          if [ "$EVENT" = "push" ]; then
            BRANCH="${{ github.ref_name }}"
            COMMIT_SHA="${{ github.sha }}"
            SHORT_SHA="${COMMIT_SHA:0:7}"
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            COMMIT_URL="${{ github.event.head_commit.url }}"
            TITLE="Push to \`${BRANCH}\`"
            DESCRIPTION="[\`${SHORT_SHA}\`](${COMMIT_URL}) ${COMMIT_MSG}"
            COLOR=3447003
          fi

          if [ "$EVENT" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_ACTION="${{ github.event.action }}"
            BRANCH="${{ github.event.pull_request.head.ref }}"

            case "$PR_ACTION" in
              opened)
                TITLE="PR #${PR_NUMBER} opened"
                COLOR=5763719
                ;;
              closed)
                if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                  TITLE="PR #${PR_NUMBER} merged"
                  COLOR=11027200
                else
                  TITLE="PR #${PR_NUMBER} closed"
                  COLOR=15548997
                fi
                ;;
              reopened)
                TITLE="PR #${PR_NUMBER} reopened"
                COLOR=16776960
                ;;
              synchronize)
                TITLE="PR #${PR_NUMBER} updated"
                COLOR=3447003
                ;;
            esac

            DESCRIPTION="[${PR_TITLE}](${PR_URL})\n\`${BRANCH}\`"
          fi

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${TITLE}\",
                \"description\": \"${DESCRIPTION}\",
                \"color\": ${COLOR},
                \"footer\": {
                  \"text\": \"${REPO}\",
                  \"icon_url\": \"${AVATAR_URL}\"
                },
                \"author\": {
                  \"name\": \"${ACTOR}\",
                  \"url\": \"${ACTOR_URL}\",
                  \"icon_url\": \"${AVATAR_URL}\"
                }
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
